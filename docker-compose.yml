services:
  telemetry-monitor:
    build:
      context: ./telemetry_monitor
    container_name: refueling-telemetry-monitor
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus
    container_name: refueling-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - telemetry-monitor

  grafana:
    image: grafana/grafana
    container_name: refueling-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus