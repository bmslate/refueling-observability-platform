services:
  telemetry-monitor:
    build:
      # context: ./telemetry_monitor
      context: .
      dockerfile: telemetry_monitor/Dockerfile
    container_name: refueling-telemetry-monitor
    ports:
      - "8000:8000"
    environment:
      RUNNING_IN_DOCKER: "true"

  prometheus:
    image: prom/prometheus
    container_name: refueling-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - telemetry-monitor

  grafana:
    image: grafana/grafana
    container_name: refueling-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  grafana-data: